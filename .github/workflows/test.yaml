name: go test

on:
  pull_request:
  push:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      -
        name: Vet
        run: go vet
      -
        name: Build
        run: go build -v
      -
        name: Test
        run: go test -v
